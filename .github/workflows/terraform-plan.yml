name: 1. Terraform Plan (Auto)
on:
  push:
    branches:
      - feature/poc-infra-update
permissions:
  id-token: write
  contents: read
jobs:
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          ref: feature/poc-infra-update
      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v2
        with:
          role-to-assume: arn:aws:iam::202533543944:role/InfraOrchestrator-GitHub-Role
          aws-region: ap-south-1
      - uses: hashicorp/setup-terraform@v2
      - name: Terraform Init
        working-directory: ./infrastructure
        run: |
          for i in 1 2 3; do
            terraform init && break || sleep 10
          done
      - name: Terraform Plan
        working-directory: ./infrastructure
        run: terraform plan
